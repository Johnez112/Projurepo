<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DistChat</title>
<style>
  /* ── Reset & base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg0:   #0d1117;
    --bg1:   #161b22;
    --bg2:   #21262d;
    --bg3:   #30363d;
    --line:  #30363d;
    --text:  #e6edf3;
    --muted: #7d8590;
    --accent:#39c5ab;
    --accent2:#58a6ff;
    --danger:#f85149;
    --gold:  #d29922;
    --radius:8px;
    --sidebar:220px;
    font-size: 14px;
  }

  body {
    background: var(--bg0);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Login screen ─────────────────────────────────────── */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--bg0);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn .3s ease;
  }
  #login-screen.hidden { display: none; }

  .login-card {
    background: var(--bg1);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 40px 36px;
    width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .login-logo .icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .login-logo h1 { font-size: 20px; font-weight: 600; letter-spacing: -.3px; }
  .login-logo span { color: var(--accent); }

  .tab-row {
    display: flex;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .field input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

  #login-error {
    color: var(--danger);
    font-size: 12px;
    margin-top: 10px;
    min-height: 16px;
    text-align: center;
  }

  /* ── App shell ────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    opacity: 0;
    transition: opacity .3s;
  }
  #app.visible { opacity: 1; }

  /* Top bar */
  #topbar {
    height: 48px;
    background: var(--bg1);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }
  .tb-logo { font-weight: 700; color: var(--accent); font-size: 15px; letter-spacing: -.3px; }
  .tb-sep { width: 1px; height: 18px; background: var(--line); }
  .tb-channel { font-weight: 600; font-size: 14px; }
  .tb-channel::before { content: '#'; color: var(--muted); margin-right: 2px; }
  .tb-spacer { flex: 1; }
  .tb-user {
    display: flex; align-items: center; gap: 7px;
    font-size: 13px; color: var(--muted);
  }
  .tb-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent);
    color: #0d1117;
    font-weight: 700;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .tb-status {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 2px var(--bg1);
  }
  .tb-status.offline { background: var(--muted); }
  #btn-logout {
    padding: 5px 10px;
    background: none;
    border: 1px solid var(--line);
    border-radius: 5px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  #btn-logout:hover { color: var(--danger); border-color: var(--danger); }

  /* Main content */
  #content {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  #sidebar {
    width: var(--sidebar);
    background: var(--bg1);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section { padding: 16px 12px 6px; }
  .sidebar-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    padding: 0 4px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-section-title button {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 16px; line-height: 1;
    padding: 0 2px;
    border-radius: 3px;
    transition: color .1s;
  }
  .sidebar-section-title button:hover { color: var(--text); }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    transition: background .1s, color .1s;
  }
  .channel-item:hover { background: var(--bg2); color: var(--text); }
  .channel-item.active { background: var(--bg3); color: var(--text); font-weight: 500; }
  .channel-item::before { content: '#'; opacity: .5; }

  .user-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 4px 8px;
    border-radius: 5px;
    font-size: 13px;
    color: var(--muted);
  }
  .user-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }

  .join-input-row {
    display: flex;
    gap: 4px;
    padding: 0 12px 10px;
  }
  .join-input-row input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 5px 8px;
    color: var(--text);
    font-size: 12px;
    outline: none;
  }
  .join-input-row input:focus { border-color: var(--accent); }
  .join-input-row button {
    padding: 5px 8px;
    background: var(--accent);
    border: none;
    border-radius: 5px;
    color: #0d1117;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  /* Chat area */
  #chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg0);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  .msg {
    display: flex;
    gap: 10px;
    padding: 3px 6px;
    border-radius: 5px;
    animation: slideIn .15s ease;
    line-height: 1.5;
  }
  .msg:hover { background: var(--bg1); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
    color: #0d1117;
    margin-top: 2px;
  }

  .msg-body { flex: 1; min-width: 0; }
  .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 1px; }
  .msg-user { font-weight: 600; font-size: 13.5px; }
  .msg-time { font-size: 11px; color: var(--muted); }
  .msg-text { font-size: 14px; color: var(--text); word-wrap: break-word; }

  /* System / status messages — base */
  .msg-system {
    padding: 3px 12px;
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
    animation: slideIn .15s ease;
    line-height: 1.5;
  }

  /* Join/leave events: *** user joined *** */
  .msg-event {
    padding: 4px 12px;
    font-size: 12px;
    font-style: normal;
    color: var(--accent);
    opacity: .75;
    animation: slideIn .15s ease;
  }

  /* Success / info messages: Switched, Users in, Active channels */
  .msg-success {
    padding: 4px 12px;
    font-size: 12.5px;
    font-style: normal;
    color: #39c5ab;
    animation: slideIn .15s ease;
  }

  /* Private messages */
  .msg-pm {
    padding: 6px 12px;
    font-size: 13px;
    font-style: normal;
    color: var(--gold);
    background: rgba(210,153,34,.08);
    border-left: 2px solid var(--gold);
    border-radius: 0 5px 5px 0;
    margin: 2px 0;
    animation: slideIn .15s ease;
  }

  /* History block: timestamped lines from history service */
  .msg-history {
    padding: 2px 12px 2px 14px;
    font-size: 13px;
    font-style: normal;
    color: var(--text);
    opacity: .7;
    border-left: 2px solid var(--bg3);
    margin: 1px 0;
    animation: slideIn .15s ease;
  }
  .msg-history .hist-time  { color: var(--muted); font-size: 11px; margin-right: 6px; }
  .msg-history .hist-user  { color: var(--accent2); font-weight: 600; margin-right: 4px; }
  .msg-history .hist-text  { color: var(--text); }

  /* /help command output */
  .msg-cmd {
    padding: 8px 14px;
    font-size: 12.5px;
    font-style: normal;
    font-family: 'Consolas', 'Cascadia Code', monospace;
    color: var(--text);
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin: 4px 0;
    white-space: pre;
    animation: slideIn .15s ease;
  }

  /* Error messages */
  .msg-error {
    padding: 5px 12px;
    font-size: 13px;
    font-style: normal;
    color: var(--danger);
    background: rgba(248,81,73,.08);
    border-left: 2px solid var(--danger);
    border-radius: 0 5px 5px 0;
    margin: 2px 0;
    animation: slideIn .15s ease;
  }

  /* History separator */
  .history-sep {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 11px;
    padding: 10px 0 6px;
    font-style: italic;
  }
  .history-sep::before, .history-sep::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }

  /* History end marker */
  .history-end {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 11px;
    padding: 4px 0 10px;
    font-style: italic;
  }
  .history-end::before, .history-end::after {
    content: ''; flex: 1; height: 1px; background: var(--bg2);
  }

  /* Input area */
  #input-area {
    padding: 12px 20px 16px;
    flex-shrink: 0;
  }
  #input-form {
    display: flex;
    gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 6px 8px 6px 14px;
    transition: border-color .15s;
  }
  #input-form:focus-within { border-color: var(--accent); }
  #msg-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    outline: none;
    line-height: 1.5;
    min-height: 24px;
    resize: none;
    font-family: inherit;
  }
  #msg-input::placeholder { color: var(--muted); }
  #send-btn {
    padding: 4px 14px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #0d1117;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    align-self: flex-end;
    transition: opacity .15s;
    flex-shrink: 0;
  }
  #send-btn:hover { opacity: .85; }
  #send-btn:disabled { opacity: .3; cursor: not-allowed; }

  .input-hint {
    font-size: 11px; color: var(--muted);
    padding: 4px 14px 0;
  }

  /* Connection banner */
  #conn-banner {
    background: var(--gold);
    color: #0d1117;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    text-align: center;
    display: none;
  }
  #conn-banner.show { display: block; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .connecting { animation: pulse .8s infinite; }
</style>
</head>
<body>

<!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">💬</div>
      <h1>Dist<span>Chat</span></h1>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Kirjaudu</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Rekisteröidy</button>
    </div>
    <div class="field">
      <label>Käyttäjänimi</label>
      <input type="text" id="l-username" placeholder="alice" autocomplete="username">
    </div>
    <div class="field">
      <label>Salasana</label>
      <input type="password" id="l-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn" onclick="handleAuth()">Kirjaudu sisään</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app">
  <div id="conn-banner" class="connecting">⚡ Yhdistetään chat-palvelimeen…</div>
  <div id="reconnect-bar" style="display:none;background:#5a2d0c;border-bottom:1px solid #f85149;padding:8px 16px;align-items:center;gap:12px;font-size:13px;">
    <span id="reconnect-msg" style="flex:1;color:#ffa07a;"></span>
    <button onclick="connectChat(currentChannel)" style="padding:4px 12px;background:#f85149;border:none;border-radius:5px;color:#fff;font-weight:600;cursor:pointer;font-size:12px;">Yritä uudelleen</button>
  </div>

  <!-- Top bar -->
  <div id="topbar">
    <span class="tb-logo">DistChat</span>
    <div class="tb-sep"></div>
    <span id="tb-channel" class="tb-channel">general</span>
    <div class="tb-spacer"></div>
    <div class="tb-user">
      <div id="tb-avatar" class="tb-avatar">?</div>
      <span id="tb-username">–</span>
      <div id="tb-status" class="tb-status offline"></div>
    </div>
    <button id="btn-logout" onclick="logout()">Kirjaudu ulos</button>
  </div>

  <div id="content">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">
          Kanavat
          <button title="Päivitä kanavat" onclick="loadChannels()">↻</button>
        </div>
        <div id="channel-list"></div>
      </div>
      <div class="join-input-row">
        <input id="new-channel-input" placeholder="uusi-kanava" maxlength="30">
        <button onclick="joinChannel()">Liity</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Paikalla</div>
        <div id="user-list"></div>
      </div>
    </div>

    <!-- Chat -->
    <div id="chat-area">
      <div id="messages"></div>
      <div id="input-area">
        <div id="input-form">
          <textarea id="msg-input" rows="1" placeholder="Kirjoita viesti… (Enter = lähetä, Shift+Enter = rivinvaihto)"></textarea>
          <button id="send-btn" onclick="sendMessage()">Lähetä</button>
        </div>
        <div class="input-hint" style="color:#39c5ab;">/help · /pm &lt;käyttäjä&gt; &lt;viesti&gt; · /users · /channels · /history [n]</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Global error handler ────────────────────────────────
window.addEventListener('unhandledrejection', e => {
  console.error('[JS] Unhandled promise rejection:', e.reason);
});
window.addEventListener('error', e => {
  console.error('[JS] Uncaught error:', e.message, 'at', e.filename, e.lineno);
});

// ─── State ────────────────────────────────────────────────
let token = '';
let currentUser = '';
let currentChannel = 'general';
let evtSource = null;
let isRegistering = false;
const AVATAR_COLORS = ['#39c5ab','#58a6ff','#d29922','#f85149','#a5d6ff','#7ee787','#ff9a5a'];

function avatarColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function initials(name) { return (name || '?')[0].toUpperCase(); }

// ─── Tab switch ───────────────────────────────────────────
function switchTab(tab) {
  isRegistering = (tab === 'register');
  document.getElementById('tab-login').classList.toggle('active', !isRegistering);
  document.getElementById('tab-register').classList.toggle('active', isRegistering);
  document.getElementById('login-btn').textContent = isRegistering ? 'Rekisteröidy' : 'Kirjaudu sisään';
  document.getElementById('login-error').textContent = '';
}

// ─── Auth ────────────────────────────────────────────────
async function handleAuth() {
  const u = document.getElementById('l-username').value.trim();
  const p = document.getElementById('l-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.textContent = '';
  if (!u || !p) { errEl.textContent = 'Täytä kaikki kentät.'; return; }
  btn.disabled = true;
  btn.textContent = '…';

  try {
    if (isRegistering) {
      const reg = await api('/api/register', { username: u, password: p });
      if (!reg.success) {
        errEl.textContent = reg.message || 'Rekisteröinti epäonnistui.';
        btn.disabled = false;
        btn.textContent = 'Rekisteröidy';
        return;
      }
    }

    const login = await api('/api/login', { username: u, password: p });
    if (!login.success) {
      errEl.textContent = login.message || 'Kirjautuminen epäonnistui.';
      btn.disabled = false;
      btn.textContent = isRegistering ? 'Rekisteröidy' : 'Kirjaudu sisään';
      return;
    }

    // Store state
    token = login.token || '';
    currentUser = login.username || u;   // fallback to typed username

    console.log('[Auth] Login ok, token:', token.slice(0,8)+'...', 'user:', currentUser);

    // Show app
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');

    const tbUser = document.getElementById('tb-username');
    if (tbUser) tbUser.textContent = currentUser;

    const av = document.getElementById('tb-avatar');
    if (av) {
      av.textContent = initials(currentUser);
      av.style.background = avatarColor(currentUser);
    }

    // Connect to chat (in try/catch so errors are visible)
    await connectChat('general');

  } catch (err) {
    console.error('[Auth] Unexpected error:', err);
    errEl.textContent = 'Odottamaton virhe: ' + err.message;
    btn.disabled = false;
    btn.textContent = isRegistering ? 'Rekisteröidy' : 'Kirjaudu sisään';
  }
}

// ─── Connect to chat via SSE bridge ──────────────────────
async function connectChat(channel) {
  showBanner(true);
  currentChannel = channel;
  document.getElementById('tb-channel').textContent = channel;
  markChannelActive(channel);

  let r;
  try {
    r = await api('/api/chat/connect', { token, channel });
  } catch(e) {
    showBanner(false);
    showConnectError('Verkkovirhe: ' + e.message);
    return;
  }

  if (!r || !r.success) {
    showBanner(false);
    showConnectError(r ? r.message : 'Ei vastausta palvelimelta');
    return;
  }

  // Show initial dump (welcome + history)
  if (r.initial) {
    appendRaw(r.initial, true);
  }

  showBanner(false);

  const statusEl = document.getElementById('tb-status');
  if (statusEl) statusEl.classList.remove('offline');

  const rbar = document.getElementById('reconnect-bar');
  if (rbar) rbar.style.display = 'none';

  console.log('[Chat] Connected, starting SSE stream');

  // Start SSE stream
  startSSE();
  loadChannels();
  loadUsers();

  // Poll channels + users every 4 seconds
  // Poll every 5 seconds for channel list + online users
  if (window._pollInterval) clearInterval(window._pollInterval);
  window._pollInterval = setInterval(() => {
    loadChannels();
    loadUsers();
  }, 2000);
}

function showConnectError(msg) {
  const bar = document.getElementById('reconnect-bar');
  document.getElementById('reconnect-msg').textContent =
    '⚠ Chat-palveluun ei saatu yhteyttä: ' + (msg || 'tuntematon virhe') +
    '. Onko chat_service.py käynnissä?';
  bar.style.display = 'flex';
}

function startSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource(`/api/chat/stream?token=${token}`);

  evtSource.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.error || data.disconnected) {
      addSystemMsg('🔌 Yhteys katkesi.');
      document.getElementById('tb-status').classList.add('offline');
      evtSource.close();
      return;
    }
    if (data.message) {
      appendRaw(data.message);
      // If someone joined or left, refresh user + channel list immediately
      const msg = data.message.trim();
      if (msg.includes(' has joined #') || msg.includes(' has left #')) {
        loadUsers();
        loadChannels();
      }
    }
  };

  evtSource.onerror = () => {
    document.getElementById('tb-status').classList.add('offline');
  };
}

// ─── Message rendering ────────────────────────────────────
function appendRaw(text, isHistory = false) {
  // Split raw TCP text into individual lines
  const lines = text.split('\n').map(l => l.trimEnd()).filter(l => l.length > 0);
  const box = document.getElementById('messages');

  if (isHistory && lines.length > 0) {
    const sep = document.createElement('div');
    sep.className = 'history-sep';
    sep.textContent = 'historia';
    box.appendChild(sep);
  }

  for (const line of lines) {

    // Control messages from server — update UI state silently
    if (line.startsWith('CHANNEL_CHANGED:')) {
      const newCh = line.split(':')[1].trim();
      currentChannel = newCh;
      document.getElementById('tb-channel').textContent = newCh;
      markChannelActive(newCh);
      // Tell gateway to update its channel tracking, then refresh lists
      api('/api/chat/update_channel', { token, channel: newCh }).then(() => {
        loadUsers();
        loadChannels();
      });
      addSystemMsg('Switched to #' + newCh);
      continue;
    }

    // Try to parse "[HH:MM:SS] [#channel] user: message"
    const chatRe = /^\[(\d{2}:\d{2}:\d{2})\]\s+\[#[^\]]+\]\s+(.+?):\s+(.+)$/;
    const youRe  = /^\[(\d{2}:\d{2}:\d{2})\]\s+You:\s+(.+)$/;
    const histRe = /^\[(\d{2}:\d{2}:\d{2})\]\s+(.+?):\s+(.+)$/;

    let m;
    if ((m = chatRe.exec(line)) !== null) {
      addMessage(m[2], m[3], m[1]);
    } else if ((m = youRe.exec(line)) !== null) {
      addMessage(currentUser + ' (sinä)', m[2], m[1]);
    } else if ((m = histRe.exec(line)) !== null) {
      addMessage(m[2], m[3], m[1]);
    } else if (line.startsWith('***') || line.startsWith('---') || line.startsWith('[PM')) {
      addSystemMsg(line);
    } else if (line.startsWith('Commands:') || line.startsWith('  /')) {
      addSystemMsg(line);
    } else if (line.trim()) {
      addSystemMsg(line);
    }
  }

  box.scrollTop = box.scrollHeight;
}

function addMessage(username, text, time) {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';

  const cleanName = username.replace(' (sinä)', '');
  const color = avatarColor(cleanName);
  const isMine = cleanName === currentUser;

  div.innerHTML = `
    <div class="msg-avatar" style="background:${color}">${initials(cleanName)}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-user" style="color:${color}">${escHtml(username)}</span>
        <span class="msg-time">${escHtml(time || '')}</span>
      </div>
      <div class="msg-text">${escHtml(text)}</div>
    </div>`;
  box.appendChild(div);
}

function addSystemMsg(text) {
  const box = document.getElementById('messages');
  const div = document.createElement('div');

  // *** join/leave events ***
  if (text.startsWith('***') && text.endsWith('***')) {
    div.className = 'msg-event';
    div.textContent = text;

  // [PM from/to user]: message
  } else if (text.startsWith('[PM')) {
    div.className = 'msg-pm';
    div.textContent = text;

  // Error messages
  } else if (text.startsWith('❌') || text.startsWith('ERROR') || text.includes('epäonnistui') || text.startsWith('🔌')) {
    div.className = 'msg-error';
    div.textContent = text;

  // /help output (lines starting with spaces + slash = command list)
  } else if (text.startsWith('  /') || text.startsWith('Commands:') || text.startsWith('Available commands:')) {
    div.className = 'msg-cmd';
    div.textContent = text;

  // History header/footer markers (--- Last N messages... / --- End of history ---)
  } else if (text.startsWith('--- Last') || text.startsWith('--- End')) {
    const sep = document.createElement('div');
    sep.className = text.startsWith('--- End') ? 'history-end' : 'history-sep';
    // Extract meaningful text: "Last 20 messages in #general" or "End of history"
    const clean = text.replace(/^---\s*/, '').replace(/\s*---$/, '');
    sep.textContent = clean;
    box.appendChild(sep);
    return;

  // Success/info: Switched, Users in, Active channels, Joined
  } else if (
    text.startsWith('Switched to #') ||
    text.startsWith('Users in #') ||
    text.startsWith('No users in #') ||
    text.startsWith('Active channels') ||
    text.startsWith('  #') ||
    text.startsWith('Joined #') ||
    text.startsWith('You joined #') ||
    text.startsWith('Already in #') ||
    text.startsWith('No active channels') ||
    text.startsWith('No history')
  ) {
    div.className = 'msg-success';
    div.textContent = text;

  // Everything else: muted italic system message
  } else {
    div.className = 'msg-system';
    div.textContent = text;
  }

  box.appendChild(div);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Send message ─────────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = '';

  const r = await api('/api/chat/send', { token, message: text });
  if (!r.success) addSystemMsg('❌ Lähetys epäonnistui: ' + (r.message || ''));
}

// ─── Channels ─────────────────────────────────────────────
async function loadChannels() {
  const r = await fetch('/api/channels').then(x => x.json()).catch(() => ({}));
  const list = document.getElementById('channel-list');
  if (!r.channels) return;

  const channelNames = [...new Set([currentChannel, ...r.channels.map(c => c.channel)])];

  // Only rebuild DOM if channels changed (avoids flicker)
  const existing = [...list.querySelectorAll('.channel-item')].map(el => el.dataset.ch);
  const same = existing.length === channelNames.length && channelNames.every((n,i) => n === existing[i]);
  if (same) { markChannelActive(currentChannel); return; }

  list.innerHTML = '';
  for (const name of channelNames) {
    const item = document.createElement('div');
    item.className = 'channel-item' + (name === currentChannel ? ' active' : '');
    item.dataset.ch = name;
    item.textContent = name;
    item.onclick = () => switchChannel(name);
    list.appendChild(item);
  }
}

async function loadUsers() {
  if (!token) return;
  const r = await fetch(`/api/chat/users?token=${encodeURIComponent(token)}&channel=${encodeURIComponent(currentChannel)}`)
    .then(x => x.json()).catch(() => ({}));
  const list = document.getElementById('user-list');
  if (!r.users) return;
  list.innerHTML = '';
  for (const u of r.users) {
    const item = document.createElement('div');
    item.className = 'user-item';
    const color = avatarColor(u);
    item.innerHTML = `<span class="user-dot" style="background:${color}"></span>${escHtml(u)}`;
    list.appendChild(item);
  }
}

async function switchChannel(name) {
  if (name === currentChannel) return;
  currentChannel = name;
  document.getElementById('tb-channel').textContent = name;
  document.getElementById('messages').innerHTML = '';
  markChannelActive(name);

  const r = await api('/api/chat/join', { token, channel: name });
  if (!r.success) {
    addSystemMsg('Kanavan vaihto epäonnistui.');
    return;
  }

  // Immediately refresh both lists on channel switch
  await Promise.all([loadChannels(), loadUsers()]);
}

async function joinChannel() {
  const inp = document.getElementById('new-channel-input');
  const name = inp.value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
  if (!name) return;
  inp.value = '';
  await switchChannel(name);
}

function markChannelActive(name) {
  document.querySelectorAll('.channel-item').forEach(el => {
    el.classList.toggle('active', el.textContent === name);
  });
}

// ─── Logout ───────────────────────────────────────────────
async function logout() {
  if (window._pollInterval) { clearInterval(window._pollInterval); window._pollInterval = null; }
  if (evtSource) evtSource.close();
  await api('/api/chat/disconnect', { token });
  await api('/api/logout', { token });
  token = ''; currentUser = ''; currentChannel = 'general';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('tb-status').classList.add('offline');
  document.getElementById('l-password').value = '';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Kirjaudu sisään';
  document.getElementById('login-error').textContent = '';
}

// ─── Banner ───────────────────────────────────────────────
function showBanner(show) {
  document.getElementById('conn-banner').classList.toggle('show', show);
}

// ─── Keyboard ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('msg-input');

  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  });

  document.getElementById('l-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAuth();
  });
  document.getElementById('l-username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('l-password').focus();
  });
  document.getElementById('new-channel-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChannel();
  });
});

// ─── API helper ───────────────────────────────────────────
async function api(path, body) {
  try {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch (e) {
    return { success: false, message: e.message };
  }
}
