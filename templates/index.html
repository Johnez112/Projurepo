<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DistChat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">💬</div>
      <h1>Dist<span>Chat</span></h1>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign in</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="l-username" placeholder="alice" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="l-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn" onclick="handleAuth()">Sign in</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app">
  <div id="conn-banner" class="connecting">⚡ Connecting to chat server…</div>
  <div id="reconnect-bar" style="display:none;background:#5a2d0c;border-bottom:1px solid #f85149;padding:8px 16px;align-items:center;gap:12px;font-size:13px;">
    <span id="reconnect-msg" style="flex:1;color:#ffa07a;"></span>
    <button onclick="connectChat(currentChannel)" style="padding:4px 12px;background:#f85149;border:none;border-radius:5px;color:#fff;font-weight:600;cursor:pointer;font-size:12px;">Retry</button>
  </div>

  <!-- Top bar -->
  <div id="topbar">
    <span class="tb-logo">DistChat</span>
    <div class="tb-sep"></div>
    <span id="tb-channel" class="tb-channel">general</span>
    <div class="tb-spacer"></div>
    <div class="tb-user">
      <div id="tb-avatar" class="tb-avatar">?</div>
      <span id="tb-username">–</span>
      <div id="tb-status" class="tb-status offline"></div>
    </div>
    <button id="btn-logout" onclick="logout()">Sign out</button>
  </div>

  <div id="content">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">
          Channels
          <button title="Refresh channels" onclick="loadChannels()">↻</button>
        </div>
        <div id="channel-list"></div>
      </div>
      <div class="join-input-row">
        <input id="new-channel-input" placeholder="new-channel" maxlength="30">
        <button onclick="joinChannel()">Join</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Online</div>
        <div id="user-list"></div>
      </div>
    </div>

    <!-- Chat -->
    <div id="chat-area">
      <div id="messages"></div>
      <div id="input-area">
        <div id="input-form">
          <textarea id="msg-input" rows="1" placeholder="Type a message… (Enter = send, Shift+Enter = new line)"></textarea>
          <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
        <div class="input-hint" style="color:#39c5ab;">/help · /pm &lt;user&gt; &lt;message&gt; · /users · /channels · /history [n]</div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
